services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: votoseguro-sqlserver
    environment:
      ACCEPT_EULA: "${ACCEPT_EULA}"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/backups:/var/opt/mssql/backups:ro
    networks:
      - votoseguro-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c '</dev/tcp/localhost/1433' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  db-restore:
    image: mcr.microsoft.com/mssql-tools
    container_name: votoseguro-db-restore
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - ./database/restore:/scripts:ro
      - ./database/backups:/var/opt/mssql/backups:ro
    command: >
      /bin/bash -c "
      /opt/mssql-tools18/bin/sqlcmd
      -S sqlserver,1433
      -U sa
      -P \"$${MSSQL_SA_PASSWORD}\"
      -C
      -b
      -i /scripts/00-restore-votoseguro.sql
      "
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - votoseguro-network
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: votoseguro-keycloak
    command:
      - start-dev
      - --proxy-headers=xforwarded
      - --hostname-strict=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KC_BOOTSTRAP_ADMIN_USERNAME}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KC_BOOTSTRAP_ADMIN_PASSWORD}"
      KC_HOSTNAME: "${KC_HOSTNAME}"
      KC_PROXY_HEADERS: "${KC_PROXY_HEADERS}"
      KC_HTTP_ENABLED: "${KC_HTTP_ENABLED}"
      KC_HOSTNAME_STRICT: "${KC_HOSTNAME_STRICT}"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8081:8080"
      - "9000:9000"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - votoseguro-network

  auditservice:
    build:
      context: .
      dockerfile: Services/AuditService/Dockerfile
    container_name: votoseguro-auditservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=VotoSeguroAuditDb;User Id=usr_audit_service;Password=${AUDIT_DB_PASSWORD};TrustServerCertificate=True;"
    depends_on:
      db-restore:
        condition: service_completed_successfully
    networks:
      - votoseguro-network

  voterservice:
    build:
      context: .
      dockerfile: Services/VoterService/Dockerfile
    container_name: votoseguro-voterservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=VotoSeguroVoterDb;User Id=usr_voter_service;Password=${VOTER_DB_PASSWORD};TrustServerCertificate=True;"
      Services__AuditService: "http://auditservice:8080"
    depends_on:
      db-restore:
        condition: service_completed_successfully
      auditservice:
        condition: service_started
    networks:
      - votoseguro-network

  referendumservice:
    build:
      context: .
      dockerfile: Services/ReferendumService/Dockerfile
    container_name: votoseguro-referendumservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=VotoSeguroReferendumDb;User Id=usr_referendum_service;Password=${REFERENDUM_DB_PASSWORD};TrustServerCertificate=True;"
      Services__AuditService: "http://auditservice:8080"
    depends_on:
      db-restore:
        condition: service_completed_successfully
      auditservice:
        condition: service_started
    networks:
      - votoseguro-network

  voteservice:
    build:
      context: .
      dockerfile: Services/VoteService/Dockerfile
    container_name: votoseguro-voteservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=VotoSeguroVoteDb;User Id=usr_vote_service;Password=${VOTE_DB_PASSWORD};TrustServerCertificate=True;"
      Services__ReferendumService: "http://referendumservice:8080"
      Services__AuditService: "http://auditservice:8080"
    depends_on:
      db-restore:
        condition: service_completed_successfully
      referendumservice:
        condition: service_started
      auditservice:
        condition: service_started
    networks:
      - votoseguro-network

  resultservice:
    build:
      context: .
      dockerfile: Services/ResultService/Dockerfile
    container_name: votoseguro-resultservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"
      Services__VoteService: "http://voteservice:8080"
    depends_on:
      voteservice:
        condition: service_started
    networks:
      - votoseguro-network

  authservice:
    build:
      context: .
      dockerfile: Services/AuthService/Dockerfile
    container_name: votoseguro-authservice
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"

      Keycloak__BaseUrl: "${KEYCLOAK_INTERNAL_URL}"
      Keycloak__Realm: "${KEYCLOAK_REALM}"
      Keycloak__ClientId: "${KEYCLOAK_AUTH_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_AUTH_CLIENT_SECRET}"

      Services__VoterServiceUrl: "http://voterservice:8080"
      Services__AuditServiceUrl: "http://auditservice:8080"
    depends_on:
      keycloak:
        condition: service_started
      voterservice:
        condition: service_started
      auditservice:
        condition: service_started
    networks:
      - votoseguro-network

  apigateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: votoseguro-apigateway
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS}"

      Authentication__MetadataAddress: "http://keycloak:8080/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration"
      Authentication__ValidIssuer: "${KC_HOSTNAME}/realms/${KEYCLOAK_REALM}"
    depends_on:
      keycloak:
        condition: service_started
      voterservice:
        condition: service_started
      referendumservice:
        condition: service_started
      voteservice:
        condition: service_started
      resultservice:
        condition: service_started
      authservice:
        condition: service_started
      auditservice:
        condition: service_started
    networks:
      - votoseguro-network

  frontend:
    build:
      context: ./sistema-votacion-web-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
        VITE_KEYCLOAK_URL: "http://localhost:8081"
    container_name: votoseguro-frontend
    ports:
      - "5173:80"
    depends_on:
      apigateway:
        condition: service_started
    networks:
      - votoseguro-network

volumes:
  sqlserver_data:
  keycloak_data:

networks:
  votoseguro-network:
    driver: bridge